# Espelho automático do livreto: HTML e PDF sempre iguais à fonte.
#
# POR QUE ISTO EXISTE
# O roadmap do livreto (SeuCondomínio) tem uma regra de ouro: o PDF é um ESPELHO
# automático do HTML — "sem humano". Lá isso é feito em RUNTIME pelo Gotenberg,
# cacheado pelo hash do HTML. Eles descartaram CI por duas restrições explícitas:
# o master tem branch protection (o workflow não consegue commitar de volta) e a
# imagem de produção não tem Chromium (PR #470, defesa contra RCE no V8).
#
# Aqui NENHUMA das duas vale: este repo não tem branch protection e o runner do
# GitHub tem Chrome. Só que o site é estático (Pages, sem runtime), então o espelho
# não pode ser em runtime — é em CI. Sem isto, quem editasse `content.py` e rodasse
# só o `build.py` publicaria um PDF VELHO em silêncio (o pior tipo de bug: nada quebra,
# o comercial só manda a versão errada pro cliente).
#
# ANTI-LOOP
# O gatilho escuta só as FONTES (content.py, build.py, assets, tools). O commit que
# este workflow faz toca apenas os GERADOS (livreto/index.html, livreto.pdf), que não
# estão no filtro — então ele não se re-dispara. O `[skip ci]` é cinto e suspensório.

name: livreto (espelho HTML + PDF)

on:
  push:
    branches: [main]
    paths:
      - 'livreto/content.py'
      - 'livreto/build.py'
      - 'livreto/build_pdf.sh'
      - 'tools/**'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: livreto
  cancel-in-progress: false

jobs:
  espelho:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Garante o Chrome (o runner já traz, mas não confie)
        run: |
          if ! command -v google-chrome >/dev/null; then
            wget -qO /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
            sudo apt-get update -qq && sudo apt-get install -y -qq /tmp/chrome.deb
          fi
          google-chrome --version

      - name: Gera o HTML e o PDF
        run: |
          python3 livreto/build.py
          bash livreto/build_pdf.sh

      # As três travas do print CSS (do playbook do SeuCondomínio) quebram em
      # SILÊNCIO: sem `.rev{opacity:1}` o PDF sai EM BRANCO e ninguém percebe até
      # o cliente abrir. Então o CI abre o PDF e confere.
      - name: Confere que o PDF não saiu em branco
        run: |
          # imagemagick NÃO vem no runner ubuntu-24.04 (o `identify` some e o passo
          # morre com exit 127) — instalar junto com o poppler.
          sudo apt-get install -y -qq poppler-utils imagemagick
          PAGS=$(pdfinfo livreto.pdf | awk '/^Pages:/{print $2}')
          echo "páginas: $PAGS"
          [ "$PAGS" -ge 8 ] || { echo "::error::PDF com só $PAGS páginas — build quebrado"; exit 1; }

          pdfinfo livreto.pdf | grep -q "A4" || echo "::warning::PDF não está em A4"

          # Uma página em branco tem desvio-padrão ~0. Se a 1ª e a 5ª forem chapadas,
          # o @media print falhou (o reveal não foi forçado) e o PDF é inútil.
          pdftoppm -jpeg -r 40 -f 1 -l 1 livreto.pdf /tmp/p1
          pdftoppm -jpeg -r 40 -f 5 -l 5 livreto.pdf /tmp/p5
          for f in /tmp/p1*.jpg /tmp/p5*.jpg; do
            SD=$(identify -format "%[standard-deviation]" "$f")
            echo "$f desvio=$SD"
            awk -v sd="$SD" 'BEGIN{ if (sd+0 < 1000) { print "::error::página em branco — o @media print quebrou (.rev{opacity:1})"; exit 1 } }'
          done

      - name: Commita o espelho, se mudou
        run: |
          if git diff --quiet -- livreto/index.html livreto.pdf; then
            echo "espelho já estava em dia — nada a fazer"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add livreto/index.html livreto.pdf
          git commit -m "chore(livreto): regenera espelho HTML+PDF [skip ci]"
          git push
