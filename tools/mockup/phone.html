<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<!--
  Quadro 2 do díptico: a TELA do baterponto no momento da batida.

  Doutrina do foundry: foto = gpt-image-1, UI = HTML/CSS. Se a interface fosse
  gerada por IA, o texto sairia alucinado ("Entrda 09:2A") e a tipografia borrada.
  Aqui ela é código: nítida, tipograficamente correta, e a MESMA em toda peça.

  O rosto vem por CSS var --face (recortado da própria foto do quadro 1, então é
  a mesma pessoa) e entra ESPELHADO — é o que a câmera frontal mostra.

  Render:  tools/build-dipticos.sh
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Azeret+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --roxo:#7C3AED; --roxo-vivo:#A855F7; --verde:#1E9E63; --verde-vivo:#3DD68C;
    --tinta:#1d1d1f; --tinta-2:#6e6e73; --linha:rgba(0,0,0,.10);
    /* preenchidos pelo build */
    --face: none;
    --face-pos: center 32%;
    --bg1:#2b0d63; --bg2:#12042e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  /* Fundo TRANSPARENTE de propósito. O Chrome pinta de branco a área do screenshot
     abaixo do documento, e brigar com isso via CSS foi um beco sem saída. Aqui a
     página entrega só o aparelho com alpha; o gradiente do painel é composto depois,
     no ImageMagick (build-dipticos.sh), onde eu controlo a cor por peça. */
  html,body{background:transparent}
  body{
    width:1000px;height:1400px;display:grid;place-items:center;
    font-family:'Inter',-apple-system,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- aparelho ---------- */
  .fone{
    position:relative;width:560px;height:1150px;border-radius:62px;
    background:linear-gradient(150deg,#3a3a40,#0d0d10 42%,#26262b);
    padding:11px;
    box-shadow:0 60px 120px -40px rgba(0,0,0,.75), 0 0 0 1px rgba(255,255,255,.08);
  }
  /* brilho de borda: o que faz o mockup parecer vidro e não retângulo */
  .fone::after{
    content:"";position:absolute;inset:0;border-radius:62px;pointer-events:none;
    background:linear-gradient(135deg,rgba(255,255,255,.35),transparent 32%,transparent 70%,rgba(255,255,255,.14));
    -webkit-mask:linear-gradient(#000,#000) content-box,linear-gradient(#000,#000);
    -webkit-mask-composite:xor;mask-composite:exclude;padding:1.5px;
  }
  .tela{
    position:relative;width:100%;height:100%;border-radius:52px;overflow:hidden;
    background:#0b0a0e;display:flex;flex-direction:column;
  }

  /* ---------- câmera frontal (o rosto) ---------- */
  .cam{position:absolute;inset:0}
  .cam img{
    width:100%;height:100%;object-fit:cover;object-position:var(--face-pos);
    transform:scaleX(-1);            /* câmera frontal é espelhada */
    filter:saturate(1.05) contrast(1.03);
  }
  /* O quadro do reconhecimento: um contêiner que ancora oval E cantoneiras.
     (Antes as cantoneiras eram posicionadas por calc() contra a tela e as duas de
     baixo caíam fora — ancorar tudo num box só elimina a aritmética frágil.) */
  .quadro{position:absolute;top:26%;left:20%;width:60%;aspect-ratio:3/4}
  /* escurece TUDO menos o oval — o furo é feito com um box-shadow gigante */
  .oval{
    position:absolute;inset:0;border-radius:50%;
    border:3px solid var(--verde-vivo);
    box-shadow:0 0 0 2000px rgba(9,8,13,.78), 0 0 44px rgba(61,214,140,.55) inset;
  }
  /* cantoneiras — detalhe que faz parecer sistema de visão, não moldura decorativa */
  .corner{position:absolute;width:28px;height:28px;border:3px solid var(--verde-vivo);opacity:.9}
  .c1{top:-16px;left:-16px;border-right:0;border-bottom:0;border-radius:8px 0 0 0}
  .c2{top:-16px;right:-16px;border-left:0;border-bottom:0;border-radius:0 8px 0 0}
  .c3{bottom:-16px;left:-16px;border-right:0;border-top:0;border-radius:0 0 0 8px}
  .c4{bottom:-16px;right:-16px;border-left:0;border-top:0;border-radius:0 0 8px 0}

  /* ---------- chrome do sistema ---------- */
  .status{
    position:relative;z-index:3;display:flex;justify-content:space-between;align-items:center;
    padding:22px 34px 0;color:#fff;font-size:17px;font-weight:600;letter-spacing:-.01em;
  }
  .status .icons{display:flex;gap:7px;align-items:center}
  .status svg{width:18px;height:18px;fill:#fff}
  .ilha{
    position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:4;
    width:120px;height:34px;border-radius:999px;background:#000;
  }

  /* ---------- topo do app ---------- */
  .topo{position:relative;z-index:3;padding:26px 30px 0;color:#fff}
  .quem{font-size:19px;font-weight:600;letter-spacing:-.02em}
  .quem span{display:block;font-size:14px;font-weight:400;color:#b9b2c9;margin-top:2px;letter-spacing:0}
  .passo{
    margin-top:20px;display:inline-flex;align-items:center;gap:8px;
    background:rgba(61,214,140,.16);border:1px solid rgba(61,214,140,.42);
    color:#3DD68C;font-size:13.5px;font-weight:600;letter-spacing:.02em;
    padding:8px 14px;border-radius:999px;backdrop-filter:blur(8px);
  }
  .passo svg{width:15px;height:15px;stroke:#3DD68C;fill:none;stroke-width:3}
  .inst{
    position:absolute;z-index:3;left:0;right:0;top:74.5%;text-align:center;
    color:#fff;font-size:19px;font-weight:600;letter-spacing:-.01em;
    text-shadow:0 2px 14px rgba(0,0,0,.7);
  }
  .inst small{display:block;margin-top:5px;font-size:14px;font-weight:400;color:#cfc7dd;letter-spacing:0}

  /* ---------- comprovante subindo ---------- */
  .folha{
    position:relative;z-index:3;margin-top:auto;
    background:#fff;border-radius:34px 34px 52px 52px;
    padding:26px 30px 34px;
    box-shadow:0 -30px 70px rgba(0,0,0,.5);
  }
  .puxador{width:44px;height:5px;border-radius:999px;background:#e2e0e6;margin:0 auto 20px}
  .ok{display:flex;align-items:center;gap:13px}
  .ok-ic{
    width:46px;height:46px;border-radius:50%;flex-shrink:0;
    background:rgba(30,158,99,.12);display:grid;place-items:center;
  }
  .ok-ic svg{width:24px;height:24px;stroke:var(--verde);fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
  .ok b{display:block;font-size:22px;font-weight:600;letter-spacing:-.02em;color:var(--tinta)}
  .ok span{display:block;font-size:15px;color:var(--tinta-2);margin-top:1px}

  .nsr{
    margin-top:22px;background:#f5f5f7;border-radius:18px;padding:16px 20px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .nsr .k{font-size:12px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--tinta-2)}
  .nsr .v{
    font-family:'Azeret Mono',monospace;font-size:26px;font-weight:700;
    letter-spacing:-.02em;color:var(--tinta);font-variant-numeric:tabular-nums;
  }
  .linhas{margin-top:16px;display:grid;gap:10px}
  .lin{display:flex;justify-content:space-between;align-items:center;font-size:14.5px}
  .lin .k{color:var(--tinta-2)}
  .lin .v{font-weight:600;color:var(--tinta);display:flex;align-items:center;gap:6px}
  .lin .v svg{width:15px;height:15px;stroke:var(--verde);fill:none;stroke-width:3}
  .selo{
    margin-top:20px;padding-top:16px;border-top:1px solid var(--linha);
    display:flex;align-items:center;justify-content:center;gap:8px;
    font-size:12.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--verde);
  }
  .selo svg{width:14px;height:14px;stroke:var(--verde);fill:none;stroke-width:2.4}
  .barra{width:150px;height:6px;border-radius:999px;background:#1d1d1f;opacity:.22;margin:22px auto 0}
</style>
</head>
<body>
  <div class="fone">
    <div class="tela">
      <!-- câmera frontal: o rosto da MESMA pessoa do quadro 1, espelhado -->
      <div class="cam"><img id="face" src="" alt="" /></div>
      <div class="quadro">
        <div class="oval"></div>
        <div class="corner c1"></div><div class="corner c2"></div>
        <div class="corner c3"></div><div class="corner c4"></div>
      </div>

      <div class="ilha"></div>
      <div class="status">
        <span>09:24</span>
        <span class="icons">
          <svg viewBox="0 0 24 24"><path d="M2 20h3v-6H2v6Zm5 0h3V9H7v11Zm5 0h3V4h-3v16Zm5 0h3v-9h-3v9Z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M12 20a1.6 1.6 0 1 0 0-3.2 1.6 1.6 0 0 0 0 3.2ZM4.6 11.4a10.5 10.5 0 0 1 14.8 0l-1.7 1.8a8 8 0 0 0-11.4 0l-1.7-1.8Zm3.4 3.5a5.6 5.6 0 0 1 8 0l-1.8 1.8a3.1 3.1 0 0 0-4.4 0l-1.8-1.8Z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M3 8h15a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2Zm18 3h1v2h-1v-2Z"/></svg>
        </span>
      </div>

      <div class="topo">
        <!-- o nome vem por parâmetro: uma tela que diz "Diego" sobre o rosto de uma
             mulher é o tipo de detalhe que o cliente vê na hora -->
        <div class="quem" id="nome">Bom dia, Diego<span>Unidade Centro · Turno manhã</span></div>
        <span class="passo">
          <svg viewBox="0 0 24 24"><path d="m5 13 4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Prova de vida · passo 2 de 2
        </span>
      </div>

      <div class="inst">Rosto reconhecido<small>Não precisa fazer mais nada.</small></div>

      <div class="folha">
        <div class="puxador"></div>
        <div class="ok">
          <span class="ok-ic">
            <svg viewBox="0 0 24 24"><path d="m5 13 4 4L19 7"/></svg>
          </span>
          <span>
            <b>Entrada registrada</b>
            <span>hoje às 09:24</span>
          </span>
        </div>

        <div class="nsr">
          <span class="k">NSR</span>
          <span class="v">000418</span>
        </div>

        <div class="linhas">
          <div class="lin"><span class="k">Prova de vida</span>
            <span class="v"><svg viewBox="0 0 24 24"><path d="m5 13 4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>Confirmada</span></div>
          <div class="lin"><span class="k">Local</span>
            <span class="v"><svg viewBox="0 0 24 24"><path d="m5 13 4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>Dentro da área</span></div>
        </div>

        <div class="selo">
          <svg viewBox="0 0 24 24"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          Registro imutável · REP-P
        </div>
        <div class="barra"></div>
      </div>
    </div>
  </div>

<script>
  // o build passa ?face=<arquivo>&pos=<object-position>&bg1=&bg2=
  const q = new URLSearchParams(location.search);
  if (q.get('face')) document.getElementById('face').src = q.get('face');
  if (q.get('nome')) {
    const el = document.getElementById('nome');
    el.childNodes[0].nodeValue = 'Bom dia, ' + q.get('nome');
  }
</script>
</body>
</html>
