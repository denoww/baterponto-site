<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bater Ponto — em breve</title>
<meta name="description" content="Ponto eletrônico no celular. Em breve." />
<meta name="robots" content="noindex" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100dvh;display:grid;place-items:center;
       font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
       background:#0d0b14;color:#f4f1fa;text-align:center;padding:24px}
  .dot{width:9px;height:9px;border-radius:50%;background:#3ddc84;display:inline-block;margin-right:8px}
  .pill{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#c9b6e8;
        border:1px solid rgba(201,182,232,.25);border-radius:999px;padding:7px 15px;display:inline-flex;align-items:center}
  h1{font-size:clamp(30px,7vw,52px);font-weight:800;letter-spacing:-.02em;margin:26px 0 0;line-height:1.1}
  p{color:#9c93b0;margin-top:16px;font-size:16px;line-height:1.6}
  code{color:#c9b6e8}
</style>
</head>
<body>
  <main>
    <span class="pill"><span class="dot"></span> em breve</span>
    <h1>baterponto<span style="color:#8e2ddb">.app</span></h1>
    <p>Ponto eletrônico no bolso do funcionário.<br />Estamos construindo algo bom.</p>
  </main>
</body>
</html>
